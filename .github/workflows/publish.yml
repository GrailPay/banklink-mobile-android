name: Publish to GitHub Packages

on:
  release:
    types: [published]

# Least privilege: read the repo to build, write packages to publish the AAR.
permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish :bank-link to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # AGP 8.x / Gradle 8.13 must run on JDK 17 (the project still targets Java 11 bytecode).
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Publish runs only on a trusted release event, so cache writes are safe.
          cache-read-only: false

      # bank-link/build.gradle.kts reads `versionName` (Gradle property) and strips a leading
      # "v" so tags like v1.2.3 or 1.2.3 both publish as 1.2.3. GITHUB_ACTOR/GITHUB_TOKEN are
      # consumed by the GitHubPackages repository credentials block.
      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: ./gradlew --no-daemon --stacktrace :bank-link:publish -PversionName="$RELEASE_TAG"
